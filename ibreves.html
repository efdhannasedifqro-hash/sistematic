<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidencias Express - SEDIF</title>
    <style>
        :root { --primary: #2c3e50; --accent: #00ad9f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; font-size: 1.4em; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--primary); margin-top: 15px; font-size: 0.9em; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 1em; box-sizing: border-box; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .row { display: flex; gap: 10px; align-items: flex-end; }
        .row input { flex: 1; }
        .btn-now { width: auto; background: #95a5a6; color: white; padding: 12px; font-size: 0.8em; margin-top: 0; cursor: pointer; border: none; font-weight: bold;}

        button#btn-enviar { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 25px; font-size: 1.1em; }
        button#btn-enviar:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #msg { display: none; text-align: center; color: #27ae60; font-weight: bold; margin-top: 15px; padding: 10px; border: 1px solid #27ae60; border-radius: 8px; background: #e6fcf5; }
        .req { color: #e74c3c; } 
        
        .back-link { display: block; text-align: center; margin-bottom: 20px; color: #7f8c8d; text-decoration: none; font-size: 0.9em; font-weight: bold; }
        .back-link:hover { color: var(--primary); }
        
        .input-manual { display: none; margin-top: 10px; border-color: #e67e22; background-color: #fffaf0; }
    </style>
</head>
<body>
    <div class="card">
        <a href="#" id="link-volver" class="back-link">← Volver a Mi Panel</a>
        <h2>Nueva Incidencia Express</h2>
        
        <label>Fecha: <span class="req">*</span></label>
        <input type="date" id="fecha">

        <label>Hora Inicio: <span class="req">*</span></label>
        <div class="row">
            <input type="time" id="hora-inicio">
            <button type="button" class="btn-now" onclick="setHora('hora-inicio')">Ahora</button>
        </div>

        <label>Hora Fin:</label>
        <div class="row">
            <input type="time" id="hora-fin" placeholder="Si se deja vacío, se usará la hora actual">
            <button type="button" class="btn-now" onclick="setHora('hora-fin')">Ahora</button>
        </div>

        <label>Área: <span class="req">*</span></label>
        <select id="area-select" onchange="verificarArea()">
            <option value="" disabled selected>Cargando catálogo...</option>
        </select>
        <input type="text" id="area-otro" class="input-manual" placeholder="Escribe el nombre de la nueva Área...">

        <label>Usuario / Solicitante: <span class="req">*</span></label>
        <select id="usuario-select" onchange="verificarUsuario()" disabled>
            <option value="" disabled selected>Primero selecciona un Área...</option>
        </select>
        <input type="text" id="usuario-otro" class="input-manual" placeholder="Escribe el nombre del nuevo Usuario...">
        
        <label>Correo del Usuario: <span class="req">*</span></label>
        <input type="email" id="correo" placeholder="ejemplo@queretaro.gob.mx" required>

        <label>Descripción del Problema: <span class="req">*</span></label>
        <textarea id="problema" rows="2" placeholder="Ej: No imprime, equipo lento..."></textarea>

        <label>Descripción del Apoyo: <span class="req">*</span></label>
        <textarea id="apoyo" rows="2" placeholder="¿Qué solución aplicaste?"></textarea>

        <label>Atendió:</label>
        <select id="tecnico">
            <option value="Mtr. Gabriel Terrazas">Mtr. Gabriel Terrazas</option>
            <option value="Lic. Miguel Chavez">Lic. Miguel Chavez</option>
            <option value="Lic. Eduardo Perez">Lic. Eduardo Perez</option>
            <option value="Lic. Martin Alejandro Reyes Bocanegra">Lic. Alejandro Reyes</option>
            <option value="Fati">Fati</option>
            <option value="Lic. Luis Carlos">Lic. Luis Carlos</option>
        </select>

        <button id="btn-enviar" onclick="enviarIncidencia()">Guardar y Enviar Acuse</button>
        <p id="msg">✅ Incidencia guardada y acuse enviado al usuario.</p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxZhLFw530NGYRXyvdJLoMw0Y40VijyHqW0dwnkEv6Id68GiB__W77WEPYoaliusost/exec';

        // --- Configurar Panel de Regreso ---
        const userRole = localStorage.getItem('userRole');
        const userName = localStorage.getItem('userName');
        const linkVolver = document.getElementById('link-volver');
        
        if (userRole === 'admin') { linkVolver.href = 'admin.html'; } 
        else if (userRole === 'tecnico') { linkVolver.href = 'tecnico.html'; }
        else { linkVolver.style.display = 'none'; }

        if (userName) {
            const selectTecnico = document.getElementById('tecnico');
            for(let i=0; i<selectTecnico.options.length; i++) {
                if(selectTecnico.options[i].value === userName || userName.includes(selectTecnico.options[i].value)) {
                    selectTecnico.selectedIndex = i; break;
                }
            }
        }

        document.getElementById('fecha').valueAsDate = new Date();

        function setHora(id) {
            const ahora = new Date();
            const horas = String(ahora.getHours()).padStart(2, '0');
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            document.getElementById(id).value = `${horas}:${minutos}`;
        }

        // --- MAGIA DEL CATÁLOGO EN CASCADA ---
        let catalogoGlobal = {}; // Aquí guardamos todo lo que nos mande el servidor

        async function cargarCatalogo() {
            const selectArea = document.getElementById('area-select');
            try {
                const res = await fetch(scriptURL + "?accion=obtener_catalogo");
                catalogoGlobal = await res.json();
                
                selectArea.innerHTML = '<option value="" disabled selected>Selecciona un área...</option>';
                
                const areasList = Object.keys(catalogoGlobal).sort();
                areasList.forEach(a => {
                    let option = document.createElement('option');
                    option.value = a; option.text = a;
                    selectArea.appendChild(option);
                });
                selectArea.innerHTML += '<option value="OTRO" style="font-weight:bold; color:#e67e22;">+ AGREGAR NUEVA ÁREA...</option>';
            } catch (e) {
                selectArea.innerHTML = '<option value="OTRO">Error de conexión. Escribir manual.</option>';
            }
        }

        // Se ejecuta al cambiar el Área
        function verificarArea() {
            const selectA = document.getElementById('area-select');
            const inputAOtro = document.getElementById('area-otro');
            const selectU = document.getElementById('usuario-select');
            const inputUOtro = document.getElementById('usuario-otro');
            const inCorreo = document.getElementById('correo');

            // Reset de usuarios y correo
            selectU.disabled = false;
            selectU.innerHTML = '<option value="" disabled selected>Selecciona un usuario...</option>';
            inputUOtro.style.display = "none"; inputUOtro.value = "";
            inCorreo.value = "";

            if (selectA.value === "OTRO") {
                // Es un área nueva, por lo tanto el usuario también debe ser nuevo
                inputAOtro.style.display = "block"; inputAOtro.focus();
                selectU.innerHTML = '<option value="OTRO" selected>+ AGREGAR NUEVO USUARIO...</option>';
                verificarUsuario(); // Forzamos mostrar el input manual de usuario
            } else {
                inputAOtro.style.display = "none"; inputAOtro.value = "";
                // Llenamos los usuarios de esa área
                const areaSel = selectA.value;
                if (catalogoGlobal[areaSel]) {
                    const usuariosArea = Object.keys(catalogoGlobal[areaSel]).sort();
                    usuariosArea.forEach(u => {
                        let option = document.createElement('option');
                        option.value = u; option.text = u;
                        selectU.appendChild(option);
                    });
                }
                selectU.innerHTML += '<option value="OTRO" style="font-weight:bold; color:#e67e22;">+ AGREGAR NUEVO USUARIO...</option>';
            }
        }

        // Se ejecuta al cambiar el Usuario
        function verificarUsuario() {
            const selectA = document.getElementById('area-select');
            const selectU = document.getElementById('usuario-select');
            const inputUOtro = document.getElementById('usuario-otro');
            const inCorreo = document.getElementById('correo');

            if (selectU.value === "OTRO") {
                // Usuario manual
                inputUOtro.style.display = "block"; inputUOtro.focus();
                inCorreo.value = ""; // Limpiamos para que escriba
            } else {
                inputUOtro.style.display = "none"; inputUOtro.value = "";
                // Magia: auto-llenamos el correo
                const areaSel = selectA.value;
                const userSel = selectU.value;
                if (catalogoGlobal[areaSel] && catalogoGlobal[areaSel][userSel]) {
                    inCorreo.value = catalogoGlobal[areaSel][userSel];
                }
            }
        }

        // Arrancamos el motor
        cargarCatalogo();

        // --- ENVÍO DE DATOS ---
        let enviandoRegistro = false; 

        async function enviarIncidencia() {
            if (enviandoRegistro === true) return; 
         
            let horaFin = document.getElementById('hora-fin').value;
            if (!horaFin) {
                const ahora = new Date();
                horaFin = `${String(ahora.getHours()).padStart(2, '0')}:${String(ahora.getMinutes()).padStart(2, '0')}`;
            }

            let areaFinal = document.getElementById('area-select').value;
            if (areaFinal === "OTRO") areaFinal = document.getElementById('area-otro').value.trim().toUpperCase();

            let usuarioFinal = document.getElementById('usuario-select').value;
            if (usuarioFinal === "OTRO") usuarioFinal = document.getElementById('usuario-otro').value.trim();

            const data = {
                accion: "guardar_ibreve", 
                fecha: document.getElementById('fecha').value,
                inicio: document.getElementById('hora-inicio').value,
                fin: horaFin, 
                usuario: usuarioFinal,
                correo: document.getElementById('correo').value.trim(),
                area: areaFinal, 
                problema: document.getElementById('problema').value,
                apoyo: document.getElementById('apoyo').value,
                tecnico: document.getElementById('tecnico').value
            };

            if(!data.usuario || !data.correo || !data.problema || !data.inicio || !data.apoyo || !data.area) {
                alert("Por favor completa todos los campos obligatorios (*)."); return;
            }

            enviandoRegistro = true; 
            const btn = document.getElementById('btn-enviar');
            btn.disabled = true; btn.innerText = "Guardando y enviando correo...";

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                document.getElementById('msg').style.display = "block";
                setTimeout(() => { location.reload(); }, 2500);
            } catch (e) {
                alert("Error de conexión con el servidor.");
                enviandoRegistro = false; btn.disabled = false; btn.innerText = "Guardar y Enviar Acuse";
            }
        }
    </script>
</body>
</html>
